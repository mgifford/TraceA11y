name: Accessibility Forensic Attribution

on:
  workflow_dispatch:
    inputs:
      reportFile:
        description: "Optional report file path (inside repository)"
        required: false
        default: ""
  push:
    paths:
      - "reports/**"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  attribute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run test suite
        run: npm test

      - name: Run attribution engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.reportFile }}" ]; then
            node src/attribute-engine.js --input "${{ github.event.inputs.reportFile }}"
          else
            node src/attribute-engine.js
          fi

      - name: Export dashboard site bundle
        run: npm run export:dashboard

      - name: Run axe-core accessibility scan on site bundle
        run: |
          npm install --no-save @axe-core/cli http-server wait-on

          npx http-server dist/site -p 4173 -s >/tmp/tracea11y-http-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT

          npx wait-on http://127.0.0.1:4173/index.html

          mkdir -p dist/a11y
          npx axe http://127.0.0.1:4173/index.html \
            --tags wcag2a,wcag2aa,wcag21aa,wcag22aa \
            --save dist/a11y/axe-report.json

      - name: Commit refreshed attributed report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/data/attributed-report.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update attributed report [skip ci]"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

      - name: Upload attributed report
        uses: actions/upload-artifact@v4
        with:
          name: attributed-report
          path: dist/data/attributed-report.json

      - name: Upload axe accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-accessibility-report
          path: dist/a11y/axe-report.json

  deploy-pages:
    needs: attribute
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
